name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install black isort

      - name: Check Python formatting
        run: |
          black --check backend worker
          isort --check-only backend worker

      - name: Build backend Docker image
        run: docker build -t sales-insight-backend ./backend

      - name: Build worker Docker image
        run: docker build -t sales-insight-worker ./worker

      - name: Build frontend Docker image
        run: docker build -t sales-insight-frontend ./frontend
